# Koyeb configuration file for bot
name: bot
services:
  - name: bot-service
    type: web
    ports:
      - port: 3000
        protocol: http
    routes:
      - path: /
        port: 3000
    regions:
      - fra
    health_checks:
      - type: http
        port: 3000
        path: /health
        method: GET
        grace_period: 60
        interval: 10
        restart_limit: 3
        timeout: 5